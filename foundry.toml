[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.26"
optimizer = true
optimizer_runs = 1_000_000
via_ir = true
remappings = [
    "forge-std/=lib/forge-std/src/",
    "v4-core/=lib/v4-core/src/",
    "v4-periphery/=lib/v4-periphery/src/",
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "permit2/=lib/v4-periphery/lib/permit2/src/",
    "solmate/=lib/v4-core/lib/solmate/src/",
    "@reactive/=lib/reactive-lib/src/",
]

[profile.default.fuzz]
runs = 10_000
seed = "0xdeadbeef"

[profile.default.invariant]
runs = 512
depth = 256
call_override = false

[profile.ci]
fuzz = { runs = 50_000 }
invariant = { runs = 1024, depth = 512 }
